<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Code Projects</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 2rem; min-height: 100vh; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.25rem; }
  .progress-bar-wrap { background: #e8e8e4; border-radius: 99px; height: 6px; margin-bottom: 0.5rem; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: #1a1a1a; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: #999; margin-bottom: 1.25rem; }
  .search-row { display: flex; gap: 8px; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .search-row input, .search-row select, .search-row button { font-size: 13px; padding: 8px 10px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #444; }
  .search-row input { flex: 1; min-width: 200px; }
  .search-row input:focus, .search-row select:focus { border-color: #999; outline: none; }
  .search-row button { cursor: pointer; }
  .search-row button:hover { background: #f0f0ee; }
  .add-btn { background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-weight: 500; white-space: nowrap; }
  .add-btn:hover { background: #333; }
  .card.custom .card-num { color: #0c447c; }
  .tag-custom { background: #f1efe8; color: #444441; }
  .btn.danger { color: #8b2e2e; border-color: #e0b4b4; }
  .btn.danger:hover { background: #fdf5f5; }
  #modal-delete { display: none; margin-right: auto; }
  .filter-label { font-size: 11px; color: #aaa; margin-bottom: 4px; margin-top: 0.75rem; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.25rem; }
  .chip { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; color: #666; cursor: pointer; transition: all 0.15s; user-select: none; }
  .chip:hover { background: #f0f0ee; }
  .chip.active { background: #f0f0ee; color: #1a1a1a; border-color: #999; font-weight: 500; }
  .count { font-size: 13px; color: #999; margin: 1rem 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; }
  .card { background: #fff; border: 0.5px solid #e5e5e0; border-radius: 12px; padding: 1rem 1.25rem; transition: opacity 0.2s, box-shadow 0.2s; position: relative; cursor: pointer; }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  .card.done { opacity: 0.45; }
  .card.starred { border-color: #f0c040; border-width: 1px; }
  .card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .card-num { font-size: 11px; color: #bbb; font-weight: 500; min-width: 24px; padding-top: 2px; flex-shrink: 0; }
  .card-title { font-size: 14px; font-weight: 500; color: #1a1a1a; line-height: 1.3; flex: 1; }
  .card-desc { font-size: 12px; color: #777; line-height: 1.5; margin-bottom: 10px; }
  .card-actions { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .card-meta { font-size: 11px; color: #9a9a9a; margin-bottom: 8px; min-height: 14px; }
  .card-url { display: block; font-size: 11px; color: #0c447c; text-decoration: none; margin-bottom: 8px; line-height: 1.4; word-break: break-all; }
  .card-url:hover { text-decoration: underline; }
  .star-btn { background: none; border: 0.5px solid #ddd; border-radius: 6px; padding: 3px 7px; font-size: 13px; cursor: pointer; color: #aaa; transition: all 0.15s; line-height: 1; }
  .star-btn:hover { border-color: #f0c040; color: #f0c040; }
  .star-btn.on { border-color: #f0c040; color: #f0c040; background: #fffbee; }
  .status-select { font-size: 11px; padding: 3px 7px; border: 0.5px solid #ddd; border-radius: 6px; background: #fff; color: #666; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; }
  .status-select.s-inprogress { border-color: #6cb4f0; color: #0c447c; background: #eef6fd; }
  .status-select.s-done { border-color: #80c9a0; color: #085041; background: #e8f6ee; }
  .tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .tag-emotional { background: #eeedfe; color: #3c3489; }
  .tag-generator { background: #e1f5ee; color: #085041; }
  .tag-practical { background: #e6f1fb; color: #0c447c; }
  .tag-creative { background: #faeeda; color: #633806; }
  .tag-data { background: #faece7; color: #712b13; }
  .tag-social { background: #fbeaf0; color: #72243e; }
  .tag-ambient { background: #eaf3de; color: #27500a; }
  .tag-life { background: #fac775; color: #412402; }
  .tag-experimental { background: #fcebeb; color: #791f1f; }
  .tag-quick { background: #f1efe8; color: #444441; }
  .tag-weekend { background: #d3d1c7; color: #2c2c2a; }
  .tag-project { background: #b4b2a9; color: #2c2c2a; }
  .no-results { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; grid-column: 1/-1; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); display: none; align-items: center; justify-content: center; padding: 1rem; z-index: 999; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; width: 100%; max-width: 680px; border-radius: 14px; border: 0.5px solid #ddd; max-height: 92vh; overflow: auto; }
  .modal-head { padding: 14px 16px; border-bottom: 0.5px solid #ecece7; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .modal-title { font-size: 14px; font-weight: 600; }
  .close-btn { border: 0; background: transparent; font-size: 20px; cursor: pointer; color: #777; line-height: 1; }
  .modal-body { padding: 14px 16px; display: grid; gap: 10px; }
  .row { display: grid; gap: 8px; grid-template-columns: 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: #7a7a7a; }
  .field input, .field select, .field textarea { font-size: 13px; border: 0.5px solid #d9d9d2; border-radius: 8px; padding: 8px 10px; font-family: inherit; }
  .field textarea { min-height: 90px; resize: vertical; }
  .modal-foot { position: sticky; bottom: 0; background: #fff; border-top: 0.5px solid #ecece7; padding: 10px 16px; display: flex; justify-content: flex-end; gap: 8px; }
  .btn { border: 0.5px solid #ccc; background: #fff; border-radius: 8px; padding: 8px 12px; font-size: 12px; cursor: pointer; }
  .btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  @media (max-width: 600px) {
    body { padding: 1rem; }
    .grid { grid-template-columns: 1fr; }
    .row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<h1>Vibe Code Projects</h1>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
<p class="progress-label" id="prog-label">0 of 103 built</p>
<div class="search-row">
  <input type="text" id="search" placeholder="Search ideas..." oninput="render()">
  <select id="sort" onchange="render()">
    <option value="num-asc">sort: number (1-103)</option>
    <option value="num-desc">sort: number (103-1)</option>
    <option value="starred">sort: starred first</option>
    <option value="status">sort: status</option>
  </select>
  <button type="button" onclick="clearFilters()">clear filters</button>
  <button type="button" class="add-btn" onclick="openAddModal()">+ add</button>
</div>
<div class="filter-label">category</div>
<div class="filter-row" id="cat-filters"></div>
<div class="filter-label">difficulty</div>
<div class="filter-row" id="diff-filters"></div>
<div class="filter-label">status</div>
<div class="filter-row" id="status-filters"></div>
<div class="count" id="count"></div>
<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Edit Project</div>
      <button class="close-btn" type="button" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label for="m-title">Title</label>
        <input id="m-title" type="text">
      </div>
      <div class="field">
        <label for="m-desc">Description</label>
        <textarea id="m-desc"></textarea>
      </div>
      <div class="row">
        <div class="field">
          <label for="m-status">Status</label>
          <select id="m-status">
            <option value="notstarted">not started</option>
            <option value="inprogress">in progress</option>
            <option value="done">done</option>
          </select>
        </div>
        <div class="field">
          <label for="m-starred">Next up / starred</label>
          <select id="m-starred">
            <option value="false">no</option>
            <option value="true">yes</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="m-tag">Category</label>
          <select id="m-tag"></select>
        </div>
        <div class="field">
          <label for="m-diff">Difficulty</label>
          <select id="m-diff"></select>
        </div>
      </div>
      <div class="field">
        <label for="m-url">URL</label>
        <input id="m-url" type="text" placeholder="https://...">
      </div>
      <div class="field">
        <label for="m-notes">Notes</label>
        <textarea id="m-notes"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn danger" type="button" id="modal-delete" onclick="deleteCustomProject()">delete</button>
      <button class="btn" type="button" onclick="closeModal()">cancel</button>
      <button class="btn primary" type="button" id="modal-save" onclick="saveModal()">save changes</button>
    </div>
  </div>
</div>

<script>
const tagLabels = { emotional:"emotional", generator:"generator", practical:"practical", creative:"creative", data:"data", social:"social", ambient:"ambient", life:"life navigation", experimental:"experimental" };
const diffLabels = { quick:"quick build", weekend:"weekend project", project:"bigger project" };
const statusLabels = { all:"all", notstarted:"not started", inprogress:"in progress", done:"done", starred:"next up / starred" };
const statusOrder = { inprogress: 0, notstarted: 1, done: 2 };

const baseProjects = [
  {n:1,title:"Internet Bedroom",desc:"A personal digital world that feels like entering your mind/space",tag:"emotional",diff:"project"},
  {n:2,title:"If My Life Was A Movie",desc:"Your life visualized as a film with soundtrack, scenes, narration, arcs",tag:"emotional",diff:"project"},
  {n:3,title:"Personal Mythology",desc:"Identity and life tracked through eras, archetypes, transformations",tag:"emotional",diff:"project"},
  {n:4,title:"Personality OS",desc:"A character-stats system for your psychology/personality",tag:"emotional",diff:"project"},
  {n:5,title:"One-Page Interactive Essays",desc:"Cinematic interactive storytelling essays about ideas/identity/life",tag:"emotional",diff:"weekend"},
  {n:6,title:"The Alternate Selves Project",desc:"Explore versions of yourself shaped by different paths/choices",tag:"emotional",diff:"weekend"},
  {n:7,title:"The Unsent Archive",desc:"Archive of unsent thoughts, messages, confessions, truths",tag:"emotional",diff:"weekend"},
  {n:8,title:"Internet Time Capsule",desc:"Save eras of your life/internet to revisit later",tag:"emotional",diff:"weekend"},
  {n:9,title:"Current State",desc:"Living snapshot of your current identity/mood/focus/obsessions",tag:"emotional",diff:"weekend"},
  {n:10,title:"The Subconscious Inbox",desc:"Collect unresolved thoughts and emotional residue",tag:"emotional",diff:"weekend"},
  {n:11,title:"Archetype Engine",desc:"Detect and evolve your dominant personality archetypes",tag:"emotional",diff:"project"},
  {n:12,title:"Explain My Own Brain Journal",desc:"AI translates messy thoughts into patterns and clarity",tag:"emotional",diff:"weekend"},
  {n:13,title:"AI Life Coach",desc:"Personalized insight/coaching from your history and patterns",tag:"emotional",diff:"project"},
  {n:14,title:"Personal Philosophy Generator",desc:"AI-generated principles and beliefs from your reflections",tag:"generator",diff:"weekend"},
  {n:15,title:"AI Creative Director",desc:"AI analyzes and reflects your aesthetic taste and inspirations",tag:"creative",diff:"project"},
  {n:16,title:"Creative Inspiration Collector",desc:"Save and organize aesthetic references and ideas",tag:"creative",diff:"weekend"},
  {n:17,title:"AI Project Manager for Solo Builders",desc:"AI-assisted execution system for creators/builders",tag:"practical",diff:"project"},
  {n:18,title:"Cursor for Life Admin",desc:"AI assistant for errands, planning, life-level organization",tag:"practical",diff:"project"},
  {n:19,title:"Private Second Brain",desc:"Retrieval-first memory and idea system",tag:"practical",diff:"project"},
  {n:20,title:"Fitness Identity System",desc:"Fitness tied to energy, identity, mood, and narrative",tag:"life",diff:"weekend"},
  {n:21,title:"Colour Palette Memoir",desc:"Generate a 5-color palette + prompts and assign memories/feelings to each color",tag:"creative",diff:"quick"},
  {n:22,title:"Constraint Creator",desc:"Spits out creative constraints to try. Log completed ones",tag:"generator",diff:"quick"},
  {n:23,title:"Proof of Existence",desc:"Daily micro-prompts for present-moment observations. Builds a timeline",tag:"emotional",diff:"weekend"},
  {n:24,title:"Energy Weather Report",desc:"Quick check-in: rate energy/focus/mood -> get a metaphor forecast + suggested action",tag:"life",diff:"quick"},
  {n:25,title:"Tiny Wins Arcade",desc:"Gamified mundane task achievements. Points, badges, dopamine",tag:"practical",diff:"weekend"},
  {n:26,title:"Sentence Remix Machine",desc:"Input a sentence -> rearranges, suggests synonyms, breaks into fragments",tag:"creative",diff:"quick"},
  {n:27,title:"Question Roulette",desc:"Timed thought-provoking questions with a typing space. Builds a question journal",tag:"emotional",diff:"quick"},
  {n:28,title:"Conspiracy Board Generator",desc:"Enter random topics -> visually connects them with red strings like a detective wall",tag:"experimental",diff:"weekend"},
  {n:29,title:"Breath Pacer Variations",desc:"Different breathing pattern visualizations (box, 4-7-8). Calming interactions",tag:"ambient",diff:"quick"},
  {n:30,title:"Project Graveyard",desc:"Archive unfinished projects with cause-of-death tags. Honor the abandoned",tag:"creative",diff:"quick"},
  {n:31,title:"Vibe Check Calendar",desc:"One-click daily vibe log (emoji). Builds a year-in-review of emotional weather",tag:"data",diff:"quick"},
  {n:32,title:"Tab Library",desc:"Save browser tabs with categories, notes, return-to dates. A curated personal archive",tag:"practical",diff:"weekend"},
  {n:33,title:"Unit Converter But Weird",desc:"Normal conversions + absurd ones: how many capybaras tall is the Eiffel Tower?",tag:"experimental",diff:"quick"},
  {n:34,title:"Rabbit Hole Mapper",desc:"Track Wikipedia/YouTube rabbit holes. Visualizes the path from topic A to Z",tag:"data",diff:"weekend"},
  {n:35,title:"Skill Tree Builder",desc:"Map skills/knowledge as a video game skill tree. Shows prerequisites and branches",tag:"practical",diff:"weekend"},
  {n:36,title:"The 100 List",desc:"100 things to do before your next big age. Granular, trackable, personal",tag:"life",diff:"quick"},
  {n:37,title:"Comfort Zone Cartographer",desc:"Map your comfort zone as literal territory. Watch it expand over time",tag:"life",diff:"weekend"},
  {n:38,title:"Who Inspires Me and Why",desc:"Inspiration board with specific qualities: This person because they started over at 30",tag:"life",diff:"quick"},
  {n:39,title:"Becoming Board",desc:"Living proof of direction. Add evidence as it happens: Signed up for first triathlon",tag:"life",diff:"quick"},
  {n:40,title:"Race Day Simulator",desc:"Walk through a mock triathlon race day: gear, nutrition timing, transitions, pacing",tag:"life",diff:"weekend"},
  {n:41,title:"Serendipity Engine",desc:"One purely random thing to look up, try, watch, or do today. Fights the algorithm",tag:"generator",diff:"quick"}
];

const STORAGE_KEY = "vibe-projects-state-v2";
const CUSTOM_STORAGE_KEY = "vibe-projects-custom-v2";
let state = loadState();
let customProjects = loadCustomProjects();
let activeCat = null;
let activeDiff = null;
let activeStatus = "all";
let editingProject = null;
let isAdding = false;

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { return {}; }
}
function saveState(nextState) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState));
}
function loadCustomProjects() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_STORAGE_KEY)) || []; } catch (e) { return []; }
}
function saveCustomProjects() {
  localStorage.setItem(CUSTOM_STORAGE_KEY, JSON.stringify(customProjects));
}
function getAllProjects() {
  return baseProjects.concat(customProjects);
}
function findProject(n) {
  return getAllProjects().find((p) => p.n === n);
}
function isCustomProject(n) {
  return customProjects.some((p) => p.n === n);
}
function nextCustomId() {
  const nums = getAllProjects().map((p) => p.n);
  return Math.max(baseProjects.length, ...nums) + 1;
}
function ensureState(n) {
  if (!state[n]) state[n] = { status: "notstarted", starred: false, url: "", notes: "", title: "", desc: "", tag: "", diff: "" };
  return state[n];
}
function getProjectState(n) {
  return ensureState(n);
}
function getProjectView(p) {
  if (p.custom) {
    return {
      ...p,
      status: p.status || "notstarted",
      starred: !!p.starred,
      url: p.url || "",
      notes: p.notes || ""
    };
  }
  const ps = getProjectState(p.n);
  return {
    ...p,
    title: ps.title || p.title,
    desc: ps.desc || p.desc,
    tag: ps.tag || p.tag,
    diff: ps.diff || p.diff,
    status: ps.status || "notstarted",
    starred: !!ps.starred,
    url: ps.url || "",
    notes: ps.notes || ""
  };
}
function readModalFields() {
  return {
    title: document.getElementById("m-title").value.trim(),
    desc: document.getElementById("m-desc").value.trim(),
    status: document.getElementById("m-status").value,
    starred: document.getElementById("m-starred").value === "true",
    tag: document.getElementById("m-tag").value,
    diff: document.getElementById("m-diff").value,
    url: document.getElementById("m-url").value.trim(),
    notes: document.getElementById("m-notes").value.trim()
  };
}
function safe(txt) {
  return String(txt || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
}
function urlHref(raw) {
  const url = String(raw || "").trim();
  if (!url) return "";
  if (/^https?:\/\//i.test(url)) return url;
  return "https://" + url;
}
function urlLabel(raw) {
  const url = String(raw || "").trim();
  if (!url) return "";
  return url.replace(/^https?:\/\//i, "").replace(/\/$/, "");
}
function cardUrlHtml(url) {
  if (!url) return "";
  const href = safe(urlHref(url));
  const label = safe(urlLabel(url));
  return `<a class="card-url" href="${href}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" title="${href}">${label}</a>`;
}
function setProjectField(n, field, value) {
  const ps = ensureState(n);
  ps[field] = value;
  saveState(state);
}
function toggleStar(n) {
  if (isCustomProject(n)) {
    const cp = customProjects.find((p) => p.n === n);
    cp.starred = !cp.starred;
    saveCustomProjects();
  } else {
    const ps = getProjectState(n);
    setProjectField(n, "starred", !ps.starred);
  }
  render();
}
function setStatus(n, value) {
  if (isCustomProject(n)) {
    const cp = customProjects.find((p) => p.n === n);
    cp.status = value;
    saveCustomProjects();
  } else {
    setProjectField(n, "status", value);
  }
  render();
}
function updateProgress() {
  const all = getAllProjects().map(getProjectView);
  const done = all.filter((p) => p.status === "done").length;
  const pct = all.length ? Math.round((done / all.length) * 100) : 0;
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-label").textContent = done + " of " + all.length + " built";
}
function renderFilters() {
  const catCounts = {}, diffCounts = {};
  getAllProjects().forEach((p) => {
    const pv = getProjectView(p);
    catCounts[pv.tag] = (catCounts[pv.tag] || 0) + 1;
    diffCounts[pv.diff] = (diffCounts[pv.diff] || 0) + 1;
  });
  const cats = Object.keys(tagLabels).sort((a, b) => (catCounts[b] || 0) - (catCounts[a] || 0));
  document.getElementById("cat-filters").innerHTML =
    '<span class="chip ' + (activeCat === null ? "active" : "") + '" onclick="setCatFilter(null)">all</span>' +
    cats.map((t) => '<span class="chip ' + (activeCat === t ? "active" : "") + '" onclick="setCatFilter(\'' + t + '\')">' + (tagLabels[t] || t) + " (" + (catCounts[t] || 0) + ")</span>").join("");
  const diffs = ["quick", "weekend", "project"];
  document.getElementById("diff-filters").innerHTML =
    '<span class="chip ' + (activeDiff === null ? "active" : "") + '" onclick="setDiffFilter(null)">all</span>' +
    diffs.map((d) => '<span class="chip ' + (activeDiff === d ? "active" : "") + '" onclick="setDiffFilter(\'' + d + '\')">' + (diffLabels[d] || d) + " (" + (diffCounts[d] || 0) + ")</span>").join("");
  const statusOpts = ["all", "starred", "notstarted", "inprogress", "done"];
  document.getElementById("status-filters").innerHTML =
    statusOpts.map((s) => '<span class="chip ' + (activeStatus === s ? "active" : "") + '" onclick="setStatusFilter(\'' + s + '\')">' + (statusLabels[s] || s) + "</span>").join("");
}
function setCatFilter(value) { activeCat = activeCat === value ? null : value; renderFilters(); render(); }
function setDiffFilter(value) { activeDiff = activeDiff === value ? null : value; renderFilters(); render(); }
function setStatusFilter(value) { activeStatus = activeStatus === value ? "all" : value; renderFilters(); render(); }
function clearFilters() {
  activeCat = null;
  activeDiff = null;
  activeStatus = "all";
  document.getElementById("search").value = "";
  document.getElementById("sort").value = "num-asc";
  renderFilters();
  render();
}
function getSorted(list) {
  const mode = document.getElementById("sort").value;
  const sorted = [...list];
  if (mode === "num-desc") sorted.sort((a, b) => b.n - a.n);
  else if (mode === "starred") sorted.sort((a, b) => Number(b.starred) - Number(a.starred) || a.n - b.n);
  else if (mode === "status") sorted.sort((a, b) => (statusOrder[a.status] ?? 9) - (statusOrder[b.status] ?? 9) || a.n - b.n);
  else sorted.sort((a, b) => a.n - b.n);
  return sorted;
}
function render() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const filtered = getAllProjects()
    .map(getProjectView)
    .filter((p) => {
      const matchesCat = !activeCat || p.tag === activeCat;
      const matchesDiff = !activeDiff || p.diff === activeDiff;
      const matchesQ = !q || p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.notes.toLowerCase().includes(q);
      let matchesStatus = true;
      if (activeStatus === "starred") matchesStatus = p.starred;
      else if (activeStatus !== "all") matchesStatus = p.status === activeStatus;
      return matchesCat && matchesDiff && matchesQ && matchesStatus;
    });
  const sorted = getSorted(filtered);
  document.getElementById("count").textContent = sorted.length + " idea" + (sorted.length !== 1 ? "s" : "");
  const grid = document.getElementById("grid");
  if (!sorted.length) {
    grid.innerHTML = '<div class="no-results">no ideas match that search</div>';
    updateProgress();
    return;
  }
  grid.innerHTML = sorted.map((p) => {
    const notesHint = !p.url && p.notes ? "notes added" : "";
    return `<div class="card${p.custom?" custom":""}${p.status==="done"?" done":""}${p.starred?" starred":""}" onclick="openModal(${p.n})">
      <div class="card-top">
        <span class="card-num">${p.custom ? "yours" : "#" + p.n}</span>
        <span class="card-title">${safe(p.title)}</span>
      </div>
      <p class="card-desc">${safe(p.desc)}</p>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="star-btn${p.starred?" on":""}" type="button" onclick="event.stopPropagation(); toggleStar(${p.n})" title="${p.starred?"Remove from next up":"Add to next up"}">&#9733;</button>
        <select class="status-select s-${p.status}" onclick="event.stopPropagation()" onchange="setStatus(${p.n},this.value)">
          <option value="notstarted"${p.status==="notstarted"?" selected":""}>not started</option>
          <option value="inprogress"${p.status==="inprogress"?" selected":""}>in progress</option>
          <option value="done"${p.status==="done"?" selected":""}>done</option>
        </select>
      </div>
      ${cardUrlHtml(p.url)}
      <div class="card-meta">${safe(notesHint)}</div>
      <div class="tags">
        ${p.custom ? '<span class="tag tag-custom">your idea</span>' : ""}
        <span class="tag tag-${p.tag}">${safe(tagLabels[p.tag] || p.tag)}</span>
        <span class="tag tag-${p.diff}">${safe(diffLabels[p.diff] || p.diff)}</span>
      </div>
    </div>`;
  }).join("");
  updateProgress();
}
function fillSelectOptions() {
  const tagSelect = document.getElementById("m-tag");
  const diffSelect = document.getElementById("m-diff");
  tagSelect.innerHTML = Object.keys(tagLabels).map((k) => `<option value="${k}">${tagLabels[k]}</option>`).join("");
  diffSelect.innerHTML = Object.keys(diffLabels).map((k) => `<option value="${k}">${diffLabels[k]}</option>`).join("");
}
function setModalMode(mode) {
  const isAdd = mode === "add";
  const isCustomEdit = mode === "custom";
  document.getElementById("modal-delete").style.display = isCustomEdit ? "inline-block" : "none";
  document.getElementById("modal-save").textContent = isAdd ? "add project" : "save changes";
}
function openAddModal() {
  isAdding = true;
  editingProject = null;
  setModalMode("add");
  document.getElementById("modal-title").textContent = "Add project";
  document.getElementById("m-title").value = "";
  document.getElementById("m-desc").value = "";
  document.getElementById("m-status").value = "notstarted";
  document.getElementById("m-starred").value = "false";
  document.getElementById("m-tag").value = "practical";
  document.getElementById("m-diff").value = "quick";
  document.getElementById("m-url").value = "";
  document.getElementById("m-notes").value = "";
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
  document.getElementById("m-title").focus();
}
function openModal(n) {
  const base = findProject(n);
  if (!base) return;
  isAdding = false;
  const p = getProjectView(base);
  editingProject = n;
  setModalMode(p.custom ? "custom" : "edit");
  document.getElementById("modal-title").textContent = (p.custom ? "Edit yours" : "Edit #" + p.n) + " - " + p.title;
  document.getElementById("m-title").value = p.title;
  document.getElementById("m-desc").value = p.desc;
  document.getElementById("m-status").value = p.status;
  document.getElementById("m-starred").value = p.starred ? "true" : "false";
  document.getElementById("m-tag").value = p.tag;
  document.getElementById("m-diff").value = p.diff;
  document.getElementById("m-url").value = p.url;
  document.getElementById("m-notes").value = p.notes;
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal() {
  editingProject = null;
  isAdding = false;
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
function deleteCustomProject() {
  if (editingProject == null || !isCustomProject(editingProject)) return;
  if (!confirm("Delete this project?")) return;
  customProjects = customProjects.filter((p) => p.n !== editingProject);
  delete state[editingProject];
  saveCustomProjects();
  saveState(state);
  closeModal();
  renderFilters();
  render();
}
function handleOverlayClick(event) {
  if (event.target.id === "modal-overlay") closeModal();
}
function saveModal() {
  const fields = readModalFields();
  if (!fields.title) {
    alert("Please add a title.");
    document.getElementById("m-title").focus();
    return;
  }
  if (isAdding) {
    const n = nextCustomId();
    customProjects.push({ n, custom: true, ...fields });
    saveCustomProjects();
    closeModal();
    renderFilters();
    render();
    return;
  }
  if (editingProject == null) return;
  if (isCustomProject(editingProject)) {
    const cp = customProjects.find((p) => p.n === editingProject);
    Object.assign(cp, fields);
    saveCustomProjects();
  } else {
    const base = findProject(editingProject);
    const s = ensureState(editingProject);
    s.title = fields.title !== base.title ? fields.title : "";
    s.desc = fields.desc !== base.desc ? fields.desc : "";
    s.status = fields.status;
    s.starred = fields.starred;
    s.tag = fields.tag;
    s.diff = fields.diff;
    s.url = fields.url;
    s.notes = fields.notes;
    saveState(state);
  }
  closeModal();
  renderFilters();
  render();
}
document.addEventListener("keydown", (event) => {
  if (event.key === "Escape" && document.getElementById("modal-overlay").classList.contains("open")) closeModal();
});
fillSelectOptions();
renderFilters();
render();
</script>
</body>
